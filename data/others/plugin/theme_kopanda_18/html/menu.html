<div id="menu_menu_wrapper">
	<div class="display_menu block_menu" align="center">

		<!-- 閉じるボタン -->
		<div class='menu_item menu_close' style='position: absolute; top: 646px; left: 24px;'>
		<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_18/image/system/menu_button_close.png" /></a>
		</div>

		<div>
			<div class="menu_item menu_save">
			<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_18/image/system/menu_button_save.png" /></a>
			</div>

			<div class="menu_item" style="display:inline-block;position:absolute;margin:0;padding:0;top:158px;left:648px;">
			<a href="javascript:void(0)" onclick="
				if(!document.fullscreenElement){
					document.documentElement.requestFullscreen().then(function(){
						var isChrome=/Chrome/.test(navigator.userAgent)&&/Android/.test(navigator.userAgent);
						if(isChrome&&screen.orientation&&screen.orientation.lock){
							screen.orientation.lock('landscape').catch(function(){});
						}
					});
				} else {
					document.exitFullscreen();
					if(screen.orientation&&screen.orientation.unlock){
						screen.orientation.unlock();
					}
				}
			">
			<img src="data/others/plugin/theme_kopanda_18/image/system/menu_button_fullscreen.png" />
			</a>
			</div>

			<div class="menu_item menu_config">
			<a href="javascript:void(0)" onclick="myobj.config();">
			<img src="data/others/plugin/theme_kopanda_18/image/system/menu_button_config.png" />
			</a>
			</div>

			<div class="menu_item menu_back_title">
			<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_18/image/system/menu_button_title.png" /></a>
			</div>

		</div>
	</div>

	<!-- 背景画像 -->
	<img src='data/others/plugin/theme_kopanda_18/image/system/menu_bg.png' style='z-index:-1;left:0;top:0;width:100%;height:100%;position:absolute;'>

	<script>
		$("#menu_menu_wrapper .menu_item img").each((i, elm) => {
			const j_elm = $(elm);
			const original_src = j_elm.attr("src");
			const hover_src = original_src.replace(".png", "2.png");
			j_elm.hover(
				() => { j_elm.attr("src", hover_src); },
				() => { j_elm.attr("src", original_src); },
			);
		});
	</script>

</div>
